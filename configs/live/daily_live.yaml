# 实盘预测专用配置（日频）
# 用法：python python/predict_live.py --model lgbm --freq daily
#       (predict_live.py 自动读取此文件，动态注入 end_time 和 segments)
#
# 与 base.yaml + configs/freq/daily.yaml 的区别：
#   1. 不含 dataset_segments（由 predict_live.py 按 --date 参数动态注入）
#   2. end_time 占位符（由 predict_live.py 替换为 --date 当日）
#   3. 去掉回测相关字段（executor、backtest）
#   4. 新增 live.* 字段控制选股行为

qlib_init:
  provider_uri: "D:/qlib_data/qlib_data"
  region: cn

experiment:
  run_id: "lgbm_daily_live"
  market: "all"
  benchmark: "000905.SZ"
  # start_time / end_time 由 predict_live.py 注入（end_time = --date 参数）
  start_time: "2020-01-01"
  end_time: "DYNAMIC"          # 占位符，predict_live.py 会替换为实际日期
  seed: 42
  tradable_universe: "csi500"  # 实盘与回测口径一致：只在 csi500 中选股

# 账户配置（用于计算具体调仓手数）
account:
  total_value: 200000          # 总资金（元），用于计算 target_shares = actual_weight × total_value / price
  trade_unit: 100              # A 股最小交易单位（1 手 = 100 股）

# 实盘选股参数
live:
  topk: 5                      # 每日最多推荐 N 只股票
  score_quantile: 0.8          # 只在 csi500 内打分前 20% 中再取 topk（提升信噪比）
  weight_method: "equal"       # equal=等权 | score=按打分比例 | inverse_vol=反波动率
  min_score_threshold: null    # 可选：打分低于此阈值的股票不推荐（null=不过滤）
  # 换仓提示阈值：当前持仓股票与新推荐偏差超过此分位时，标记为 "建议换仓"
  drop_signal_quantile: 0.3    # 持仓股票打分低于 csi500 内此分位 → 标记 drop_out

# 特殊股票过滤（ST / 连续涨停）
filter:
  # ST CSV 路径：自动从 qlib_init.provider_uri/is_st.csv 推断，也可显式指定
  st_csv_path: "D:/qlib_data/qlib_data/is_st.csv"
  exclude_st: true           # 过滤所有 ST/*ST 类股票（日限幅仅 ±5%，财务风险高）
  exclude_limit_up: true     # 过滤连续涨停股票（封单风险，T+1 大概率无法买入）
  consecutive_limit_days: 3  # 连续涨停天数阈值（0 = 不启用；建议 2~4）

# 模型路径（predict-only 模式使用；retrain-and-predict 模式会覆盖 latest）
model_store:
  base_dir: "artifacts/models"
  # latest_path = <base_dir>/latest_<model>_<freq>.pkl
  # predict_live.py 自动拼接，无需手动填写

# 历史预测追踪
tracking:
  predictions_dir: "predictions"   # 预测结果保存目录（相对仓库根）
  history_days: 20                 # report.html 中展示最近 N 日预测记录

# MarketTimer：目标波动率仓位缩放（每日预测后自动计算并注入 actual_weight）
# risk_factor = clip(σ_target / (√252 · σ̂_{t+1|GARCH}), min_risk, max_risk)
# 高波动期自动减仓（如 40% 年化波动 → risk_factor ≈ 0.38），低波动期满仓。
market_timer:
  enabled: true                  # false = 关闭，actual_weight = suggested_weight
  type: "garch"                  # garch（主推）| rolling（稳健）| null（满仓基线）
  benchmark: "000905.SZ"         # CSI500，与 tradable_universe 对齐
  target_vol: 0.25               # 年化目标波动率 25%（轻度风控，仅高波动期才减仓）
  min_risk: 0.50                 # 最低仓位 50%（低于此值每只持仓不足 100 股，trade_unit 截断→冻结）
  max_risk: 1.0                  # 不加杠杆
  refit_freq: 5                  # 每 5 个交易日重拟合 GARCH（每周一次）
  min_obs: 120                   # 冷启动保护：历史不足 120 日时退化为满仓
  hist_start: "2018-01-01"       # 用于加载 CSI500 历史收益率的起始日期
