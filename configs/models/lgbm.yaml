# LightGBM 模型配置（平铺特征，DatasetH）
# 对应 qlib.contrib.model.gbdt.LGBModel
# **kwargs 直接传给 lightgbm train 的 params（objective 由 loss 注入 self.params）
#
# 处理器链沿用 base.yaml（含 CSZScoreNorm(feature)）：
#   截面归一化让模型学到"特征排名"而非"特征绝对值"，跨年度可比，
#   是控制 IC 标准差与跨周期稳定性的关键环节，不可省略。

model_meta:
  name: "lgbm"
  dataset_type: "flat"
  freq_key: "1day"
  # 树模型对高维特征鲁棒，使用全部因子组（含基本面），为下一期扩展因子保留最大空间
  feature_groups: ~
  # 仅在 LGBM 合并：追加 configs/combined_factors_df.json 中列出的 IC 筛选因子（run_experiment 专用）
  combined_factors_json: "configs/combined_factors_df.json"

model:
  class: "LGBModel"
  module_path: "qlib.contrib.model.gbdt"
  kwargs:
    # 实测：huber + CSRankNorm 标签([0,1] 范围) 配合不佳 ——
    #   huber 的 alpha=0.9 截断阈值在小尺度标签上几乎不触发，
    #   退化为接近 mse 但收敛慢 8 倍且 test IC 反而下降 15%。
    # 故仍使用 mse；如果未来希望尝试 huber，需要把标签恢复到 z-score 尺度。
    loss: "mse"
    # valid 拉长到 2024 全年后，给早停更宽松的窗口，避免在年度风格切换处过早终止。
    early_stopping_rounds: 200
    # 学习率减半，配合更高轮数上限（仍由早停截断），获得更平滑的梯度方向。
    num_boost_round: 5000
    learning_rate: 0.012
    # 与 max_depth=5 严格配套：2^5=32，避免叶子表达力远超 ~31 维特征的有效信号。
    num_leaves: 31
    max_depth: 5
    # 低维特征下放宽叶子样本下限，挖掘小簇 alpha；正则与 path_smooth 接管过拟合控制。
    min_child_samples: 200
    min_split_gain: 0.0
    # 特征仅 ~31，提升列采样比例减少信息丢失；feature_fraction_bynode 维持节点级随机。
    feature_fraction: 0.85
    feature_fraction_bynode: 0.85
    bagging_fraction: 0.8
    # 每轮都触发样本扰动：集成式稳定性最大收益项，对 ICIR 提升关键。
    bagging_freq: 1
    reg_alpha: 0.3
    reg_lambda: 2.0
    # 节点级随机分裂，对厚尾收益的 IC std 下降很关键。
    extra_trees: true
    # 叶子值平滑，跨期预测稳定性更好。
    path_smooth: 1.0
    seed: 42
    feature_fraction_seed: 42
    bagging_seed: 42
    data_random_seed: 42
    deterministic: true
    force_col_wise: true
    num_threads: -1
