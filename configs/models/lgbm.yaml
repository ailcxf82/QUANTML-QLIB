# LightGBM 模型配置（平铺特征，DatasetH）
# 对应 qlib.contrib.model.gbdt.LGBModel
# **kwargs 直接传给 lightgbm train 的 params（objective 由 loss 注入 self.params）
#
# 处理器链沿用 base.yaml（含 CSZScoreNorm(feature)）：
#   截面归一化让模型学到"特征排名"而非"特征绝对值"，跨年度可比，
#   是控制 IC 标准差与跨周期稳定性的关键环节，不可省略。

model_meta:
  name: "lgbm"
  dataset_type: "flat"
  freq_key: "1day"
  # 树模型对高维特征鲁棒，使用全部因子组（含基本面），为下一期扩展因子保留最大空间
  feature_groups: ~
  # 仅在 LGBM 合并：追加 configs/combined_factors_df.json 中列出的 IC 筛选因子（run_experiment 专用）
  combined_factors_json: "configs/combined_factors_df.json"

model:
  class: "LGBModel"
  module_path: "qlib.contrib.model.gbdt"
  kwargs:
    loss: "mse"
    # R1 容量收紧：因子数从 26 → 78（剔除 5 个 train↔test 反转后），
    # 模型容量随之降一档，避免 OOS 弱因子被组合放大。
    # 调整依据（audit_p0_diagnosis.py 实测）：
    #   - 单因子 |test ICIR| 中位数：新 1.28 vs 老 1.38（基本同档）
    #   - 但 83 列 + 旧超参时 train_sec 23s → 178s（树数 ~5x），月度超额
    #     在 8 个月跌 >2pp，集中在风格切换月（2025-02 -20.8pp 等）。
    early_stopping_rounds: 80
    num_boost_round: 800
    learning_rate: 0.02
    num_leaves: 31
    max_depth: 6
    min_child_samples: 1000
    min_split_gain: 0.005
    feature_fraction: 0.7
    feature_fraction_bynode: 0.85
    bagging_fraction: 0.7
    bagging_freq: 5
    reg_alpha: 1.0
    reg_lambda: 10.0
    seed: 42
    feature_fraction_seed: 42
    bagging_seed: 42
    data_random_seed: 42
    deterministic: true
    force_col_wise: true
    num_threads: -1
