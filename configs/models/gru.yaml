# GRU 模型配置（时序，TSDatasetH）
# 对应 qlib.contrib.model.pytorch_gru.GRU
# 接口与 LSTM 完全相同，只换模型类

model_meta:
  name: "gru"
  dataset_type: "ts"
  step_len: 20
  freq_key: "1day"
  # 时序模型侧重捕捉量价序列模式，基本面因子时序变化慢且对序列建模贡献有限
  feature_groups:
    - momentum
    - volume
    - technical

model:
  class: "GRU"
  module_path: "qlib.contrib.model.pytorch_gru_ts"
  kwargs:
    d_feat: 20
    hidden_size: 64
    num_layers: 2
    dropout: 0.1
    n_epochs: 100
    lr: 0.001
    metric: ""
    batch_size: 800
    early_stop: 20
    loss: "mse"
    optimizer: "adam"
    n_jobs: 4
    GPU: -1
    seed: 42
