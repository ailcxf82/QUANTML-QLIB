# 日频交易 + 止盈 / 止损 / 移动止损（与 Qlib 日频 bar 一致，无盘中触发）
# =========================================================================
# 使用方式：
#   python python/run_experiment.py --model lgbm --freq daily \
#       --strategy-cfg configs/strategy/daily_sl_tp.yaml \
#       --ensemble-seeds 5
#
# 说明：
#   - rebalance_freq: 1 → 每个 trade_step 用模型重算权重（日频）
#   - n_drop: 每期"上期持有→本期目标外"最多 N 只（不含止盈止损平仓）。
#             与 risk_cfg.max_turnover 互补：前者控票数，后者控金额。
#   - exit_* ：在持有且仍位于目标组合内的标的上按收盘价判定；止损/止盈触发后从目标权中剔除并再归一化
#   - trailing_stop_pct：相对持仓以来峰值回撤比例（峰值在日频上逐 bar 更新）

strategy:
  class: "QuantMLWeightStrategy"
  module_path: "backtest.strategy"
  kwargs:
    topk: 5
    score_quantile: 0.70
    rebalance_freq: 1
    vol_lookback: 60
    trade_unit: 100            # 下单股数按 100 股一手取整（不足 100 股订单丢弃）
    n_drop: 1                 # topk=5 → 单日最多换出 1 只
    weighter_cfg:
      type: "inverse_vol"
      kwargs:
        lookback: 60
        min_vol: 0.005
    risk_cfg:
      max_weight: 0.30
      sector_max_weight: 1.0
      # 放宽日换手率限制：模型 IC≈0.04 的水平下，限制 0.4 会截断每日新发出的优质信号；
      # 0.7 既保留风控边界，又让模型大部分信号能及时执行。
      max_turnover: 0.70
    exit_rules:
      # A 股个股日波动 3~5% 是常态，止损 0.08 在正常震荡中频繁误触发将模型选对的票切在低位；
      # 0.15 给震荡留出空间，仅在真正趋势反转时触发。
      stop_loss_pct: 0.15
      take_profit_pct: 0.50
      # 移动止损 0.06 极紧，刚选对的票回吐 6% 就被动平仓，吃不到中期趋势；
      # 0.12 保留趋势捕捉能力，又能在见顶后及时离场。
      trailing_stop_pct: 0.12
    stock_filter_cfg:
      st_csv_path: "D:/qlib_data/qlib_data/is_st.csv"
      consecutive_limit_days: 1   # 连续涨停天数阈值（0 = 不过滤涨停）
      exclude_st: true            # 回测中禁止持有 ST 类股票
      exclude_limit_up: true      # 回测中禁止买入连续涨停股票
