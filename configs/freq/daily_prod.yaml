# 日频生产训练配置：尽可能使用最新可得历史训练，
# 并保留最近两个月作为上线前 sanity backtest。

freq_meta:
  name: "daily_prod"
  freq_key: "1day"

# P2 目标：
# - train 用到 2025 年底，贴近当前市场结构
# - valid 用 2026Q1 做早停，避免过拟合旧风格
# - test 保留 2026-03~2026-05-07 做上线前 sanity 检查
#
# 重要：仅改 dataset_segments.test 不够 ——
#   1) BacktestEngine 已与 segments.test 对齐回测 end（见 python/backtest/engine.py）
#   2) DataHandlerLP 的 handler.end_time 必须 >= test 结束日，否则 Qlib 根本拉不到 5 月行情
#   3) experiment.end_time 建议与 test 对齐，便于 universe 过滤等逻辑与日历一致（旧版仅用其作回测 end 已废弃）

experiment:
  end_time: "2026-05-12"

dataset:
  kwargs:
    handler:
      kwargs:
        end_time: "2026-05-12"

dataset_segments:
  train: ["2020-01-01", "2025-12-31"]
  valid: ["2026-01-01", "2026-02-28"]
  test:  ["2026-03-01", "2026-05-12"]

executor:
  class: "SimulatorExecutor"
  module_path: "qlib.backtest.executor"
  kwargs:
    time_per_step: "day"
    generate_portfolio_metrics: true

backtest:
  exchange_kwargs:
    freq: "day"
    limit_threshold: 0.095
    deal_price: "close"
    open_cost: 0.0025
    close_cost: 0.0035
    min_cost: 5
    impact_cost: 0
